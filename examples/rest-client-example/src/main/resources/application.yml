spring:
  application:
    name: rest-client-example
  main:
    banner-mode: off

platform:
  rest:
    client:
      clients:

        # ── posts-client ──────────────────────────────────────────────────────
        # Demonstrates: endpoint catalogue, static default query params, URI
        # template variable, retry with status-code triggers, and timeouts.
        posts-client:
          base-url: https://jsonplaceholder.typicode.com
          default-accept: application/json
          connect-timeout: 5s
          read-timeout: 10s
          retry:
            max-attempts: 3
            wait-duration: 500ms
            retry-on-response-statuses: [ 429, 503 ]
          endpoints:
            list-posts:
              method: GET
              path: /posts
              # _limit is a JSONPlaceholder pagination param; sent on every call
              # to this endpoint without any extra code in the service layer.
              default-query-params:
                _limit: "10"
            get-post:
              method: GET
              # {id} is expanded at call time via Map.of("id", <value>)
              path: /posts/{id}

        # ── users-client ──────────────────────────────────────────────────────
        # Demonstrates: a second independent named client with its own retry policy.
        users-client:
          base-url: https://jsonplaceholder.typicode.com
          default-accept: application/json
          connect-timeout: 5s
          read-timeout: 10s
          retry:
            max-attempts: 2
            wait-duration: 250ms
          endpoints:
            list-users:
              method: GET
              path: /users
            get-user:
              method: GET
              path: /users/{id}

